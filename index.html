<!DOCTYPE html>
<html lang="ru">
<head>
    <title>3D VR Panorama + Gyro</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7); z-index: 10; color: white;
        }
        button {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            border: none; border-radius: 5px; background: #2196F3; color: white;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Объемная панорама</h1>
        <button id="start-button">Включить гироскоп и войти</button>
        <p style="font-size: 12px; margin-top: 10px;">(требуется для работы наклонов телефона)</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { DeviceOrientationControls } from 'three/addons/controls/DeviceOrientationControls.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let camera, scene, renderer, controls;
        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('start-button');

        // --- ИНИЦИАЛИЗАЦИЯ ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 0, 0.1);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Загрузка текстур
            const loader = new THREE.TextureLoader();
            const texColor = loader.load('photo.jpg');
            const texDepth = loader.load('depth.jpg');

            const geometry = new THREE.SphereGeometry(500, 512, 256);
            geometry.scale(-1, 1, 1);

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uMap: { value: texColor },
                    uDepthMap: { value: texDepth },
                    uThreshold: { value: 20.0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    uniform sampler2D uDepthMap;
                    uniform float uThreshold;
                    void main() {
                        vUv = uv;
                        vec4 depthSample = texture2D(uDepthMap, vUv);
                        float depth = depthSample.r;
                        vec3 newPosition = position + normal * depth * uThreshold;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    uniform sampler2D uMap;
                    void main() {
                        gl_FragColor = texture2D(uMap, vUv);
                    }
                `
            });

            const sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // По умолчанию включаем обычное вращение пальцем
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.rotateSpeed = -0.25;

            animate();
        }

        // --- ОБРАБОТКА КЛИКА (Запрос доступа к гироскопу) ---
        startButton.addEventListener('click', function() {
            // Если это iPhone (iOS), нужно спросить разрешение
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            activateGyro();
                        } else {
                            alert('Доступ к гироскопу отклонен.');
                            hideOverlay();
                        }
                    })
                    .catch(console.error);
            } else {
                // Для Android и компьютеров просто включаем
                activateGyro();
            }
        });

        function activateGyro() {
    // 1. Пытаемся запустить стандартный контроллер
    try {
        controls.dispose(); 
        controls = new DeviceOrientationControls(camera);
        
        // 2. Проверяем, идут ли данные с датчика
        window.addEventListener('deviceorientation', function(event) {
            if (event.alpha !== null) {
                console.log("Датчики работают!");
                hideOverlay();
            } else {
                // Если данные приходят "пустые", значит датчик заблокирован системой
                alert("Датчик отвечает 'null'. Проверьте настройки приватности телефона.");
            }
        }, { once: true });

    } catch (e) {
        alert("Ошибка при запуске гироскопа: " + e.message);
    }
}

        function hideOverlay() {
            overlay.style.display = 'none';
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
