<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Для Ани</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* СТИЛИ ДЛЯ ТАБЛИЧКИ */
        .welcome-label {
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 40px;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #E91E63;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        let camera, scene, renderer, cssRenderer, controls;

        function init() {
            // 1. Сцена и камера
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 0, 0.1);

            // 2. Рендерер для 3D (панорама)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0';
            document.body.appendChild(renderer.domElement);

            // 3. Рендерер для текста (HTML)
            cssRenderer = new CSS3DRenderer();
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.domElement.style.position = 'absolute';
            cssRenderer.domElement.style.top = '0';
            cssRenderer.domElement.style.pointerEvents = 'none'; 
            document.body.appendChild(cssRenderer.domElement);

            // 4. Панорама и объем
            const loader = new THREE.TextureLoader();
            const texColor = loader.load('photo.jpg');
            const texDepth = loader.load('depth.jpg');

            const geometry = new THREE.SphereGeometry(500, 512, 256);
            geometry.scale(-1, 1, 1); 

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uMap: { value: texColor },
                    uDepthMap: { value: texDepth },
                    uThreshold: { value: 15.0 } 
                },
                vertexShader: `
                    varying vec2 vUv;
                    uniform sampler2D uDepthMap;
                    uniform float uThreshold;
                    void main() {
                        vUv = uv;
                        vec4 depthSample = texture2D(uDepthMap, vUv);
                        float depth = depthSample.r;
                        vec3 newPosition = position + normal * depth * uThreshold;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    uniform sampler2D uMap;
                    void main() {
                        gl_FragColor = texture2D(uMap, vUv);
                    }
                `
            });

            const sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // 5. Табличка
            const div = document.createElement('div');
            div.className = 'welcome-label';
            div.textContent = 'Привет, Аня!';

            const labelObject = new CSS3DObject(div);
            labelObject.position.set(0, 0, -350); // Прямо перед глазами
            scene.add(labelObject);

            // 6. Управление пальцем/мышкой
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.rotateSpeed = -0.25; // Инверсия для естественного вращения
            controls.enableZoom = false;

            animate();
        }

        // --- ДОБАВЛЯЕМ УПРАВЛЕНИЕ WASD ---
            const keys = { w: false, a: false, s: false, d: false };
            const speed = 2.0; // Скорость шага
            
            // Слушаем нажатия кнопок
            window.addEventListener('keydown', (e) => {
                if(e.key.toLowerCase() === 'w' || e.key.toLowerCase() === 'ц') keys.w = true;
                if(e.key.toLowerCase() === 'a' || e.key.toLowerCase() === 'ф') keys.a = true;
                if(e.key.toLowerCase() === 's' || e.key.toLowerCase() === 'ы') keys.s = true;
                if(e.key.toLowerCase() === 'd' || e.key.toLowerCase() === 'в') keys.d = true;
            });
            
            // Слушаем отпускание кнопок
            window.addEventListener('keyup', (e) => {
                if(e.key.toLowerCase() === 'w' || e.key.toLowerCase() === 'ц') keys.w = false;
                if(e.key.toLowerCase() === 'a' || e.key.toLowerCase() === 'ф') keys.a = false;
                if(e.key.toLowerCase() === 's' || e.key.toLowerCase() === 'ы') keys.s = false;
                if(e.key.toLowerCase() === 'd' || e.key.toLowerCase() === 'в') keys.d = false;
            });
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            cssRenderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        });
                    function animate() {
                requestAnimationFrame(animate);
                
                // --- Логика ходьбы ---
                // Узнаем, куда сейчас смотрит камера
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                direction.y = 0; // Запрещаем летать вверх/вниз
                direction.normalize();
            
                // Вектор шага вбок
                const right = new THREE.Vector3();
                right.crossVectors(camera.up, direction).normalize();
            
                // Двигаем камеру и "цель" мышки одновременно
                if (keys.w) { camera.position.addScaledVector(direction, speed); controls.target.addScaledVector(direction, speed); }
                if (keys.s) { camera.position.addScaledVector(direction, -speed); controls.target.addScaledVector(direction, -speed); }
                if (keys.a) { camera.position.addScaledVector(right, speed); controls.target.addScaledVector(right, speed); }
                if (keys.d) { camera.position.addScaledVector(right, -speed); controls.target.addScaledVector(right, -speed); }
            
                controls.update();
                renderer.render(scene, camera);
                cssRenderer.render(scene, camera);
            }

        init();
    </script>
</body>
</html>
