<!DOCTYPE html>
<html lang="ru">
<head>
    <title>3D VR Panorama for Anya</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Стили для оверлея с кнопкой */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7); z-index: 100; color: white; transition: opacity 0.5s;
        }
        button {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            border: none; border-radius: 5px; background: #E91E63; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* --- СТИЛИ ДЛЯ ТАБЛИЧКИ "ПРИВЕТ, АНЯ" --- */
        .welcome-label {
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.85); /* Полупрозрачный белый фон */
            color: #333;
            font-size: 40px;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 2px solid #E91E63; /* Розовая рамочка */
            text-align: center;
            pointer-events: none; /* Чтобы сквозь неё можно было кликать */
            white-space: nowrap; /* Чтобы текст не переносился */
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Объемная панорама</h1>
        <button id="start-button">Включить гироскоп и войти</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { DeviceOrientationControls } from 'three/addons/controls/DeviceOrientationControls.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        // Импортируем рендерер для HTML-элементов
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        let camera, scene, renderer, cssRenderer, controls;
        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('start-button');

        function init() {
            // --- 1. СЦЕНА И КАМЕРА ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 0, 0.1);

            // --- 2. ОБЫЧНЫЙ РЕНДЕРЕР (для 3D сферы) ---
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute'; // Важно для наложения
            renderer.domElement.style.top = 0;
            document.body.appendChild(renderer.domElement);

            // --- 3. CSS3D РЕНДЕРЕР (для таблички) ---
            cssRenderer = new CSS3DRenderer();
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.domElement.style.position = 'absolute'; // Важно для наложения
            cssRenderer.domElement.style.top = 0;
            cssRenderer.domElement.style.pointerEvents = 'none'; // Чтобы можно было вращать панораму, кликая по экрану
            document.body.appendChild(cssRenderer.domElement);


            // --- 4. ЗАГРУЗКА 3D ПАНОРАМЫ (СФЕРЫ) ---
            const loader = new THREE.TextureLoader();
            const texColor = loader.load('photo.jpg');
            const texDepth = loader.load('depth.jpg');

            const geometry = new THREE.SphereGeometry(500, 512, 256);
            geometry.scale(-1, 1, 1); // Выворачиваем

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uMap: { value: texColor },
                    uDepthMap: { value: texDepth },
                    uThreshold: { value: 20.0 } // Сила объема
                },
                vertexShader: `
                    varying vec2 vUv;
                    uniform sampler2D uDepthMap;
                    uniform float uThreshold;
                    void main() {
                        vUv = uv;
                        vec4 depthSample = texture2D(uDepthMap, vUv);
                        float depth = depthSample.r;
                        vec3 newPosition = position + normal * depth * uThreshold;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    uniform sampler2D uMap;
                    void main() {
                        gl_FragColor = texture2D(uMap, vUv);
                    }
                `
            });

            const sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);


            // --- 5. СОЗДАНИЕ ТАБЛИЧКИ "ПРИВЕТ, АНЯ" ---
            
            // А. Создаем обычный HTML-элемент
            const div = document.createElement('div');
            div.className = 'welcome-label';
            div.textContent = 'Привет, Аня!';

            // Б. Оборачиваем его в 3D-объект Three.js
            const labelObject = new CSS3DObject(div);
            
            // В. Позиционируем его в 3D пространстве.
            // Сфера имеет радиус 500, так что ставим табличку чуть ближе (например, на 400).
            labelObject.position.set(0, 50, -400); // (X, Y, Z). Z=-400 это прямо перед камерой.
            
            // Г. Добавляем табличку на сцену
            scene.add(labelObject);


            // --- 6. УПРАВЛЕНИЕ ---
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.rotateSpeed = -0.25;
            controls.enableZoom = false;

            animate();
        }

        // --- ЛОГИКА АКТИВАЦИИ ГИРОСКОПА (как в прошлом шаге) ---
        startButton.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') { activateGyro(); } else { hideOverlay(); }
                    })
                    .catch(console.error);
            } else {
                activateGyro();
            }
        });

        function activateGyro() {
            controls.dispose();
            controls = new DeviceOrientationControls(camera);
            hideOverlay();
        }

        function hideOverlay() {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            
            // Важно: рендерим оба слоя!
            renderer.render(scene, camera);   // 3D сфера
            cssRenderer.render(scene, camera); // HTML табличка
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight); // Не забываем про второй рендерер
        });

        init();
    </script>
</body>
</html>
