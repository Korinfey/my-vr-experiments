<!DOCTYPE html>
<html lang="ru">
<head>
    <title>3D World for Anya</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Стили для таблички */
        .welcome-label {
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 40px;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #E91E63;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Подсказка по управлению */
        #instructions {
            position: absolute; bottom: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.5);
            padding: 10px; border-radius: 5px; pointer-events: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="instructions">
        Вращение: Мышь / Палец <br>
        Движение: W, A, S, D (английская раскладка)
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        let camera, scene, renderer, cssRenderer, controls;
        const keys = { w: false, a: false, s: false, d: false };
        const moveSpeed = 1.5; // Скорость перемещения

        function init() {
            // 1. Сцена и камера
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 3000);
            camera.position.set(0, 0, 0.1);

            // 2. Рендерер для 3D (панорама)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0';
            document.body.appendChild(renderer.domElement);

            // 3. Рендерер для текста (HTML)
            cssRenderer = new CSS3DRenderer();
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.domElement.style.position = 'absolute';
            cssRenderer.domElement.style.top = '0';
            cssRenderer.domElement.style.pointerEvents = 'none'; 
            document.body.appendChild(cssRenderer.domElement);

            // 4. Панорама и объем
            const loader = new THREE.TextureLoader();
            const texColor = loader.load('photo.jpg');
            const texDepth = loader.load('depth.jpg');

            const geometry = new THREE.SphereGeometry(1000, 512, 256); // Увеличили сферу, чтобы было где ходить
            geometry.scale(-1, 1, 1); 

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uMap: { value: texColor },
                    uDepthMap: { value: texDepth },
                    uThreshold: { value: 30.0 } // Сделали объем чуть выразительнее
                },
                vertexShader: `
                    varying vec2 vUv;
                    uniform sampler2D uDepthMap;
                    uniform float uThreshold;
                    void main() {
                        vUv = uv;
                        vec4 depthSample = texture2D(uDepthMap, vUv);
                        float depth = depthSample.r;
                        vec3 newPosition = position + normal * depth * uThreshold;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    uniform sampler2D uMap;
                    void main() {
                        gl_FragColor = texture2D(uMap, vUv);
                    }
                `
            });

            const sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // 5. Табличка
            const div = document.createElement('div');
            div.className = 'welcome-label';
            div.textContent = 'Привет, Аня!';

            const labelObject = new CSS3DObject(div);
            labelObject.position.set(0, 0, -400); 
            scene.add(labelObject);

            // 6. Управление камерой (вращение)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.rotateSpeed = -0.25;
            controls.enableZoom = false;

            // 7. Слушатели клавиатуры для ходьбы
            window.addEventListener('keydown', (e) => handleKey(e.key, true));
            window.addEventListener('keyup', (e) => handleKey(e.key, false));

            animate();
        }

        function handleKey(key, isPressed) {
            const k = key.toLowerCase();
            if (k === 'w' || k === 'ц') keys.w = isPressed;
            if (k === 's' || k === 'ы') keys.s = isPressed;
            if (k === 'a' || k === 'ф') keys.a = isPressed;
            if (k === 'd' || k === 'в') keys.d = isPressed;
        }

        function animate() {
            requestAnimationFrame(animate);

            // ЛОГИКА ПЕРЕМЕЩЕНИЯ (WASD)
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            direction.y = 0; // Ходим только по плоскости земли
            direction.normalize();

            const right = new THREE.Vector3();
            right.crossVectors(camera.up, direction).normalize();

            if (keys.w) {
                camera.position.addScaledVector(direction, moveSpeed);
                controls.target.addScaledVector(direction, moveSpeed);
            }
            if (keys.s) {
                camera.position.addScaledVector(direction, -moveSpeed);
                controls.target.addScaledVector(direction, -moveSpeed);
            }
            if (keys.a) {
                camera.position.addScaledVector(right, moveSpeed);
                controls.target.addScaledVector(right, moveSpeed);
            }
            if (keys.d) {
                camera.position.addScaledVector(right, -moveSpeed);
                controls.target.addScaledVector(right, -moveSpeed);
            }

            controls.update();
            renderer.render(scene, camera);
            cssRenderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera
